<div class="flex h-screen overflow-hidden bg-forest-50 font-sans">

  <app-sidebar [open]="sidebarOpen()" (close)="sidebarOpen.set(false)" />

  <main class="flex min-w-0 flex-1 flex-col overflow-hidden">
    <header class="flex flex-shrink-0 items-center gap-3 border-b border-forest-100 bg-white px-4 py-4 shadow-sm">
      <button type="button" (click)="sidebarOpen.set(true)" class="flex-shrink-0 rounded-lg p-2 text-forest-600 transition hover:bg-forest-100 md:hidden" aria-label="Abrir menú">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="min-w-0 flex-1">
        <h1 class="truncate text-lg font-bold text-forest-900">{{ title }}</h1>
        <p class="truncate text-xs text-forest-500">{{ subtitle }}</p>
      </div>
    </header>
    <div class="flex-1 overflow-y-auto px-4 py-4 sm:px-6 sm:py-6">
      <ng-content />
    </div>
  </main>
</div>
